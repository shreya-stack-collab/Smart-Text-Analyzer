<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Text Analyzer Pro | Digital Heroes Trial</title>
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --border: #27272a;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --zinc-800: #3f3f46;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container { width: 100%; max-width: 900px; }

        header { text-align: center; margin-bottom: 2rem; }
        header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.05em; margin-bottom: 0.5rem; }
        
        .user-info { 
            background: #1e1e22; 
            display: inline-block; 
            padding: 0.5rem 1.5rem; 
            border-radius: 50px; 
            border: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .analyzer-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        textarea {
            width: 100%;
            height: 280px;
            background: #09090b;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            padding: 1.2rem;
            font-size: 1rem;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            transition: all 0.2s;
        }

        textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }

        /* Statistics Layout */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .stat-box {
            background: #212124;
            padding: 1.2rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-value { display: block; font-size: 1.6rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em; }

        /* Tools & Actions */
        .tool-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
        }

        .button-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        
        button {
            padding: 0.6rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            background: var(--zinc-800);
            color: white;
        }

        button:hover { background: #52525b; }
        .primary-btn { background: var(--accent); }
        .primary-btn:hover { background: var(--accent-hover); }

        /* Keyword Tags */
        .keyword-container { margin-top: 1rem; }
        .keyword-title { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        #keywordsList { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .keyword-tag { background: #27272a; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.75rem; border: 1px solid var(--border); }

        /* Branding Button */
        .btn-hero {
            background: #fff;
            color: #000;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 2rem;
            padding: 1rem;
            border-radius: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: 0.3s;
        }

        .btn-hero:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        @media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Smart Text Analyzer Pro</h1>
            <div class="user-info">
                <strong>Shreya Mehta </strong> • compdegree14@gmail.com
            </div>
        </header>

        <main class="analyzer-card">
            <textarea id="textInput" placeholder="Start typing or paste your content... (Work is saved automatically)"></textarea>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <span id="wordCount" class="stat-value">0</span>
                    <span class="stat-label">Words</span>
                </div>
                <div class="stat-box">
                    <span id="charCount" class="stat-value">0</span>
                    <span class="stat-label">Characters</span>
                </div>
                <div class="stat-box">
                    <span id="sentenceCount" class="stat-value">0</span>
                    <span class="stat-label">Sentences</span>
                </div>
                <div class="stat-box">
                    <span id="readTime" class="stat-value">0m</span>
                    <span class="stat-label">Reading Time</span>
                </div>
                <div class="stat-box">
                    <span id="speakTime" class="stat-value">0m</span>
                    <span class="stat-label">Speaking Time</span>
                </div>
            </div>

            <div class="tool-section">
                <div class="button-group">
                    <button class="primary-btn" onclick="copyText()" id="copyBtn">Copy Text</button>
                    <button onclick="changeCase('upper')">UPPERCASE</button>
                    <button onclick="changeCase('lower')">lowercase</button>
                    <button onclick="changeCase('title')">Title Case</button>
                    <button onclick="clearText()" style="color: #ff4444;">Clear All</button>
                </div>

                <div class="keyword-container">
                    <p class="keyword-title">Top Keywords:</p>
                    <div id="keywordsList">
                        <span class="keyword-tag">No data yet</span>
                    </div>
                </div>
            </div>
        </main>

        <a href="https://digitalheroesco.com" class="btn-hero" target="_blank">
            Built for Digital Heroes
        </a>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        
        // Initialize: Load saved data from LocalStorage
        window.onload = () => {
            const savedText = localStorage.getItem('smartTextContent');
            if (savedText) {
                textInput.value = savedText;
                processText();
            }
        };

        textInput.addEventListener('input', processText);

        function processText() {
            const val = textInput.value;
            
            // Auto-Save
            localStorage.setItem('smartTextContent', val);

            // Basic Stats
            const words = val.trim() ? val.trim().split(/\s+/).filter(w => w.length > 0) : [];
            document.getElementById('wordCount').innerText = words.length;
            document.getElementById('charCount').innerText = val.length;
            
            const sentences = val ? val.split(/[.!?]+/).filter(s => s.trim().length > 0) : [];
            document.getElementById('sentenceCount').innerText = sentences.length;

            // Time Estimations
            document.getElementById('readTime').innerText = Math.ceil(words.length / 225) + 'm';
            document.getElementById('speakTime').innerText = Math.ceil(words.length / 150) + 'm';

            // Keyword Density (Suggestion)
            updateKeywords(words);
        }

        function updateKeywords(words) {
            if (words.length < 5) return;
            const stopWords = ['the','a','an','and','is','in','it','you','of','to','for','with','on','this','that'];
            const freqMap = {};
            
            words.forEach(w => {
                let word = w.toLowerCase().replace(/[^a-z]/g, '');
                if (word.length > 3 && !stopWords.includes(word)) {
                    freqMap[word] = (freqMap[word] || 0) + 1;
                }
            });

            const sorted = Object.entries(freqMap)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3);

            const list = document.getElementById('keywordsList');
            list.innerHTML = sorted.length 
                ? sorted.map(k => `<span class="keyword-tag">${k[0]} (${k[1]})</span>`).join('')
                : '<span class="keyword-tag">Type more...</span>';
        }

        function changeCase(type) {
            let txt = textInput.value;
            if (type === 'upper') txt = txt.toUpperCase();
            if (type === 'lower') txt = txt.toLowerCase();
            if (type === 'title') {
                txt = txt.toLowerCase().split(' ').map(s => s.charAt(0).toUpperCase() + s.substring(1)).join(' ');
            }
            textInput.value = txt;
            processText();
        }

        function copyText() {
            if (!textInput.value) return;
            navigator.clipboard.writeText(textInput.value);
            const btn = document.getElementById('copyBtn');
            btn.innerText = '✓ Copied!';
            btn.style.background = 'var(--success)';
            setTimeout(() => {
                btn.innerText = 'Copy Text';
                btn.style.background = 'var(--accent)';
            }, 2000);
        }

        function clearText() {
            if(confirm('Clear all text?')) {
                textInput.value = '';
                localStorage.removeItem('smartTextContent');
                processText();
            }
        }
    </script>
</body>
</html>
